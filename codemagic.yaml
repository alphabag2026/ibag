workflows:
  ios-build:
    name: iBag iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alphabag.ibag
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 18
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor
        script: |
          npx cap copy ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Set iOS version
        script: |
          cd ios/App
          agvtool new-marketing-version 5.3.4
          agvtool new-version -all 1
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  ios-adhoc:
    name: iBag iOS Ad Hoc Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.alphabag.ibag
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 18
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor
        script: |
          npx cap copy ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Set iOS version
        script: |
          cd ios/App
          agvtool new-marketing-version 5.3.4
          agvtool new-version -all 1
      - name: Build iOS app (Ad Hoc)
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
