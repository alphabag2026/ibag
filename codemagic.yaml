workflows:
  ios-build:
    name: iBag iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - code-signing
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.alphabag.ibag"
      node: 18
      cocoapods: default
    integrations:
      app_store_connect: alphabag
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor
        script: |
          npx cap copy ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Set iOS version
        script: |
          cd ios/App
          agvtool new-marketing-version 5.3.4
          agvtool new-version -all $(($(date +%s) / 60))
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-build:
    name: iBag Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: "com.alphabag.ibag"
      java: 17
      node: 18
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Set Android version
        script: |
          cd android/app
          NEW_VERSION_CODE=$(($(date +%s) / 60))
          sed -i '' "s/versionCode [0-9]*/versionCode $NEW_VERSION_CODE/" build.gradle
          sed -i '' "s/versionName \"[^\"]*\"/versionName \"5.3.4\"/" build.gradle
          echo "Updated versionCode to $NEW_VERSION_CODE"
          grep -E "versionCode|versionName" build.gradle
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/mapping.txt
